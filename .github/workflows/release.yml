name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: release-aarch64

      - name: Verify icon present
        run: test -f assets/icon/AppIcon.icns || { echo "::error::assets/icon/AppIcon.icns missing — block on real icon per launch design"; exit 1; }

      - name: Determine signing capability
        id: signing
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
        run: |
          if [[ -n "$APPLE_DEVELOPER_ID" && -n "$APPLE_CERT_P12_BASE64" && -n "$APPLE_CERT_PASSWORD" ]]; then
            echo "Developer ID signing enabled"
            echo "sign_developer_id=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::Developer ID secrets absent — falling back to ad-hoc signing. End users will see a Gatekeeper warning."
            echo "sign_developer_id=false" >> $GITHUB_OUTPUT
          fi
          if [[ -n "$APPLE_API_KEY_BASE64" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_KEY_ISSUER_ID" ]]; then
            echo "Notarization enabled"
            echo "notarize=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::Notarization API key secrets absent — skipping notarytool submission."
            echo "notarize=false" >> $GITHUB_OUTPUT
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install protoc
        run: brew install protobuf

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version "~0"

      - name: Import signing certificate
        if: steps.signing.outputs.sign_developer_id == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/vcm-release.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm $RUNNER_TEMP/cert.p12

      - name: Decode notarization API key
        if: steps.signing.outputs.notarize == 'true'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/api-key.p8
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/api-key.p8" >> $GITHUB_ENV

      - name: Build release binaries
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package .app
        run: cargo packager --release --target aarch64-apple-darwin

      - name: Locate bundle
        run: |
          APP=target/aarch64-apple-darwin/release/VCM.app
          test -d "$APP" || { echo "::error::Expected .app not found at $APP"; exit 1; }
          echo "APP_PATH=$APP" >> "$GITHUB_ENV"

      - name: Codesign the bundle (Developer ID)
        if: steps.signing.outputs.sign_developer_id == 'true'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign --force --deep --options runtime --timestamp \
              --entitlements assets/macos/entitlements.plist \
              --sign "$APPLE_DEVELOPER_ID" \
              "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

      - name: Codesign the bundle (ad-hoc fallback)
        if: steps.signing.outputs.sign_developer_id != 'true'
        run: |
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

      - name: Build DMG from signed .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="VCM-${VERSION}-aarch64.dmg"
          STAGE="$RUNNER_TEMP/dmg-stage"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "VCM" \
              -srcfolder "$STAGE" \
              -ov -format UDZO \
              "$DMG_NAME"
          rm -rf "$STAGE"
          echo "DMG_PATH=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Sign DMG (Developer ID)
        if: steps.signing.outputs.sign_developer_id == 'true'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: codesign --sign "$APPLE_DEVELOPER_ID" --timestamp "$DMG_PATH"

      - name: Notarize DMG
        if: steps.signing.outputs.notarize == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Build standalone vcmctl tarball
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          SIGN_DEVELOPER_ID: ${{ steps.signing.outputs.sign_developer_id }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE=$RUNNER_TEMP/vcmctl-stage
          mkdir -p "$STAGE"
          cp target/aarch64-apple-darwin/release/vcmctl "$STAGE/vcmctl"
          if [[ "$SIGN_DEVELOPER_ID" == "true" ]]; then
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_DEVELOPER_ID" \
              "$STAGE/vcmctl"
          else
            codesign --force --sign - "$STAGE/vcmctl"
          fi
          tar -C "$STAGE" -czf "vcmctl-${VERSION}-aarch64-apple-darwin.tar.gz" vcmctl
          echo "VCMCTL_TARBALL=vcmctl-${VERSION}-aarch64-apple-darwin.tar.gz" >> $GITHUB_ENV

      - name: Generate SHA256 checksums
        run: |
          shasum -a 256 "$DMG_PATH" | awk '{print $1}' > "${DMG_PATH}.sha256"
          shasum -a 256 "$VCMCTL_TARBALL" | awk '{print $1}' > "${VCMCTL_TARBALL}.sha256"

      - name: Compose release notes prelude
        run: |
          {
            if [[ "${{ steps.signing.outputs.sign_developer_id }}" == "false" ]]; then
              cat <<'EOF'
            > **First launch on macOS:** VCM v0.1 is ad-hoc-signed (not notarized by Apple). On first launch you may see "VCM cannot be opened because the developer cannot be verified." Bypass: right-click `VCM.app` in Finder → **Open** → click "Open" in the confirmation dialog. Only needed once. Alternative: `xattr -d com.apple.quarantine /Applications/VCM.app`.
          EOF
            fi
          } > release-notes-prelude.md

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release-notes-prelude.md
          append_body: true
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.DMG_PATH }}.sha256
            ${{ env.VCMCTL_TARBALL }}
            ${{ env.VCMCTL_TARBALL }}.sha256
          generate_release_notes: true
