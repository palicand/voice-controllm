name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CMAKE_C_FLAGS: "-march=armv8.2-a+crypto+simd"
  CMAKE_CXX_FLAGS: "-march=armv8.2-a+crypto+simd"

jobs:
  release:
    runs-on: macos-14
    env:
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: brew install protobuf

      - name: Import Developer ID certificate
        if: env.APPLE_CERT_P12_BASE64 != ''
        env:
          KEYCHAIN_PASSWORD: ci-keychain-${{ github.run_id }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
          echo -n "$APPLE_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
              -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
              $(security list-keychains -d user | tr -d '"')

      - name: Write notarization API key
        if: env.APPLE_API_KEY_BASE64 != ''
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Package
        run: ./scripts/package.sh

      - name: Build tarball for cargo-install / Nix users
        run: |
          mkdir -p dist
          tar czf "dist/vcm-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" \
              -C target/aarch64-apple-darwin/release vcm vcmctl vcmd
          ( cd dist && shasum -a 256 "vcm-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" \
              > "vcm-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz.sha256" )

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VCM-*.dmg
            dist/VCM-*.dmg.sha256
            dist/vcm-*.tar.gz
            dist/vcm-*.tar.gz.sha256
          generate_release_notes: true
          draft: true

      - name: Cleanup keychain
        if: always() && env.APPLE_CERT_P12_BASE64 != ''
        run: security delete-keychain "$RUNNER_TEMP/ci.keychain-db" || true
