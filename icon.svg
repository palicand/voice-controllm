<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>

    <linearGradient id="gloss" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <clipPath id="squircleClip">
      <rect x="64" y="64" width="896" height="896" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <rect x="64" y="78" width="896" height="896" rx="200" ry="200"
        fill="#000000" opacity="0.25" filter="url(#dropShadow)"/>

  <!-- Squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>

  <g clip-path="url(#squircleClip)">
    <!-- Sound wave arcs (behind mic) -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="20">
      <!-- Left side arcs (open rightward toward mic) -->
      <path d="M 397 362 A 140 140 0 0 0 397 522" stroke-opacity="0.9"/>
      <path d="M 365 307 A 200 200 0 0 0 365 577" stroke-opacity="0.6"/>
      <path d="M 345 243 A 260 260 0 0 0 345 641" stroke-opacity="0.3"/>
      <!-- Right side arcs (open leftward toward mic) -->
      <path d="M 627 362 A 140 140 0 0 1 627 522" stroke-opacity="0.9"/>
      <path d="M 659 307 A 200 200 0 0 1 659 577" stroke-opacity="0.6"/>
      <path d="M 679 243 A 260 260 0 0 1 679 641" stroke-opacity="0.3"/>
    </g>

    <!-- Microphone -->
    <g fill="#FFFFFF">
      <!-- Capsule head -->
      <rect x="422" y="262" width="180" height="360" rx="90" ry="90"/>
      <!-- Stem -->
      <rect x="500" y="622" width="24" height="110"/>
      <!-- Base plate -->
      <rect x="394" y="732" width="236" height="28" rx="14"/>
    </g>

    <!-- Top gloss highlight -->
    <rect x="64" y="64" width="896" height="896" fill="url(#gloss)" pointer-events="none"/>
  </g>
</svg>
